name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pin Node 22 explicitly. The plugin repo has no committed
      # package-lock.json (per AGENTS.md §13), so skip npm cache
      # (which relies on a lockfile for the cache key).
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Gitleaks
        continue-on-error: true
        uses: zricethezav/gitleaks-action@v2
      - name: npm audit
        continue-on-error: true
        run: npm audit --audit-level=low

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - name: Type check
        continue-on-error: true
        run: npm run type-check

  test:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - name: Run tests with coverage
        env:
          NODE_OPTIONS: '--experimental-test-coverage'
        run: npm test
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn
